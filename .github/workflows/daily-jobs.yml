name: Daily job digest

# Scrape job sources → grade with Gemini → (optionally) build tailored CVs → email a digest.
#
# This template repo ships with the daily SCHEDULE DISABLED so a fresh clone never
# fail-spams you before it's configured. To run it for real:
#   1. Add the repo Secrets: GEMINI_API_KEY, GMAIL_ADDRESS, GMAIL_APP_PASSWORD
#      (and optionally SERPAPI_KEY). See docs/github-actions-setup.md.
#   2. Uncomment the `schedule:` block below to enable the daily run.
# Until then you can still trigger it by hand from the Actions tab (workflow_dispatch).

on:
  # --- To enable the daily run, add your secrets, then uncomment these 3 lines: ---
  # schedule:
  #   # 06:23 UTC, deliberately off the congested top-of-hour. Cron is best-effort.
  #   - cron: "23 6 * * *"
  workflow_dispatch:      # manual trigger (always available) from the Actions tab
    inputs:
      strong_threshold:
        description: "One-off test: promote any match scoring >= this (0-100) to 'strong'. Leave blank for normal."
        required: false
        default: ""
      template:
        description: "One-off: CV template folder under templates/latex/ (e.g. maltacv). Blank = use config."
        required: false
        default: ""

concurrency:
  group: daily-jobs
  cancel-in-progress: false

permissions:
  contents: write   # lets the scheduled run commit state/seen_jobs.json back

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          python -m playwright install --with-deps chromium

      - name: Install LaTeX (for tailored CV PDFs)
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            latexmk texlive-latex-recommended texlive-latex-extra \
            texlive-fonts-recommended texlive-fonts-extra \
            texlive-xetex texlive-luatex \
            texlive-bibtex-extra biber tex-gyre
            # xetex/luatex: fontspec templates; bibtex-extra+biber: AltaCV biblatex; tex-gyre: tgheros etc.

      - name: Ensure a config exists
        run: |
          if [ ! -f config/job_preferences.md ]; then
            echo "No config/job_preferences.md — falling back to the example."
            cp config/job_preferences.example.md config/job_preferences.md 2>/dev/null || true
          fi

      - name: Run daily pipeline
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_PROJECT_ID: ${{ secrets.GEMINI_PROJECT_ID }}
          GMAIL_ADDRESS: ${{ secrets.GMAIL_ADDRESS }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          SERPAPI_KEY: ${{ secrets.SERPAPI_KEY }}   # optional — enables Google Jobs
          GEMINI_MODEL: ${{ vars.GEMINI_MODEL }}    # optional repo Variable; blank = code default
        run: |
          python scripts/daily_job_pipeline.py --full-pipeline \
            ${{ github.event_name == 'schedule' && '--track-seen' || '' }} \
            ${{ github.event.inputs.strong_threshold != '' && format('--strong-threshold {0}', github.event.inputs.strong_threshold) || '' }} \
            ${{ github.event.inputs.template != '' && format('--template {0}', github.event.inputs.template) || '' }}

      - name: Persist seen-jobs state
        if: github.event_name == 'schedule'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add state/seen_jobs.json 2>/dev/null || true
          git diff --cached --quiet || { git commit -m "Update seen-jobs state [skip ci]"; git push; }

      - name: Upload results + generated CVs (debug)
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: job-search-output
          path: |
            outputs/job_search_results_*.json
            outputs/job_offers/**
          if-no-files-found: ignore
          retention-days: 14
