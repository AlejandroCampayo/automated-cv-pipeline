name: Daily job digest

# Runs the scrape → grade → email pipeline every morning.
# Requires repo Secrets: GEMINI_API_KEY, GMAIL_ADDRESS, GMAIL_APP_PASSWORD
# (see docs/github-actions-setup.md).

on:
  schedule:
    # GitHub cron is UTC. 06:00 UTC ≈ 08:00 in Luxembourg (CEST, summer).
    # In winter (CET) this fires at 07:00 local — adjust to '0 7 * * *' if you prefer.
    - cron: "0 6 * * *"
  workflow_dispatch:      # lets you trigger a run manually from the Actions tab
    inputs:
      strong_threshold:
        description: "One-off test: promote any match scoring >= this (0-100) to 'strong'. Leave blank for normal."
        required: false
        default: ""

concurrency:
  group: daily-jobs
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          python -m playwright install --with-deps chromium

      - name: Install LaTeX (for tailored CV PDFs)
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            latexmk texlive-latex-recommended texlive-latex-extra \
            texlive-fonts-recommended texlive-fonts-extra

      - name: Ensure a config exists
        run: |
          if [ ! -f config/job_preferences.md ]; then
            echo "No config/job_preferences.md — falling back to the example."
            cp config/job_preferences.example.md config/job_preferences.md 2>/dev/null || true
          fi

      - name: Run daily pipeline
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_PROJECT_ID: ${{ secrets.GEMINI_PROJECT_ID }}
          GMAIL_ADDRESS: ${{ secrets.GMAIL_ADDRESS }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          SERPAPI_KEY: ${{ secrets.SERPAPI_KEY }}   # optional — enables Google Jobs
        run: |
          python scripts/daily_job_pipeline.py --full-pipeline \
            ${{ github.event.inputs.strong_threshold != '' && format('--strong-threshold {0}', github.event.inputs.strong_threshold) || '' }}

      - name: Upload results + generated CVs (debug)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: job-search-output
          path: |
            outputs/job_search_results_*.json
            outputs/job_offers/**
          if-no-files-found: ignore
          retention-days: 14
